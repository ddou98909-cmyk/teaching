<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Purple/indigo rounded background -->
  <rect width="100" height="100" rx="22" fill="#6C6FC5"/>
  <!-- Book outer rectangle -->
  <rect x="28" y="17" width="40" height="52" rx="4" fill="none" stroke="white" stroke-width="4.5"/>
  <!-- Bottom horizontal line (shelf/table line) -->
  <line x1="22" y1="75" x2="78" y2="75" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Inner page line -->
  <line x1="28" y1="62" x2="68" y2="62" stroke="white" stroke-width="4.5"/>
</svg>
